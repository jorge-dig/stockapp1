version: "3.8"

services:
  mysql:
    image: mysql:8.0
    container_name: stockapp_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-stockroot}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-stockapp}
      MYSQL_USER: ${MYSQL_USER:-stockuser}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-stockpass}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  phpmyadmin:
    image: phpmyadmin:latest
    container_name: stockapp_phpmyadmin
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      PMA_HOST: mysql
      PMA_PORT: 3306
      PMA_USER: ${MYSQL_USER:-stockuser}
      PMA_PASSWORD: ${MYSQL_PASSWORD:-stockpass}
    ports:
      - "8080:80"

volumes:
  mysql_data:
